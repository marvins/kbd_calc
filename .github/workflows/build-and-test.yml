name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Print runner environment details for debugging. CMake location is checked
    # on Linux because the runner ships a pre-installed cmake in /usr/local/bin
    # that can shadow the version we install later.
    - name: System information
      run: |
        echo "=== OS ==="
        uname -a
        if [ "$RUNNER_OS" == "macOS" ]; then
          sw_vers
          echo "=== CPUs ==="
          sysctl -n hw.ncpu
          echo "=== RAM ==="
          sysctl -n hw.memsize | awk '{printf "%.1f GB\n", $1/1024/1024/1024}'
        else
          cat /etc/os-release
          echo "=== CPUs ==="
          nproc
          echo "=== RAM ==="
          free -h | awk '/^Mem:/ {print $2}'
        fi
        echo "=== CMake ==="
        cmake --version || echo "CMake not yet installed"
        if [ "$RUNNER_OS" != "macOS" ]; then
          echo "=== CMake location ==="
          which cmake || echo "cmake not in PATH"
          echo "=== All cmake binaries ==="
          find /usr /opt /home/runner -name "cmake*" -type f 2>/dev/null
        fi
        echo "=== Compiler ==="
        c++ --version

    # The project requires CMake 4.0+. Ubuntu runners ship an older cmake in
    # /usr/local/bin which takes PATH precedence. We remove it first, then add
    # Kitware's official APT repo and install their current release.
    - name: Install CMake 4 (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        # Remove the pre-installed cmake so Kitware's /usr/bin/cmake wins in PATH
        sudo rm -f /usr/local/bin/cmake /usr/local/bin/cpack /usr/local/bin/ctest
        wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
          gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
        echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
          sudo tee /etc/apt/sources.list.d/kitware.list
        sudo apt-get update
        sudo apt-get install -y cmake

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install sdl2 libpng

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get install -y libsdl2-dev libpng-dev

    # On macOS, Homebrew installs SDL2/libpng under /opt/homebrew which is not
    # a default CMake search path. CMAKE_PREFIX_PATH tells CMake to look there.
    - name: Build project
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          CMAKE_PREFIX_PATH=$(brew --prefix) ./scripts/build.sh -j$(sysctl -n hw.ncpu)
        else
          ./scripts/build.sh -j$(nproc)
        fi

    - name: Run unit tests
      run: |
        cd build
        ./calc_tests
