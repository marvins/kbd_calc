# KBD-Calc Default Settings
# Copy this file to your config directory and customize as needed.
# Location depends on platform:
#   - SDL (macOS): ~/Library/Application Support/kbd_calc/settings.toml
#   - SDL (Linux): ~/.config/kbd_calc/settings.toml
#   - Pi Zero: /home/pi/.config/kbd_calc/settings.toml
#   - PicoCalc: /settings.toml (root of SD card)

[general]
# Time zone for clock display
# Options: "auto" (system default), "UTC", "America/New_York", "Europe/London", etc.
timezone = "auto"

# Display settings
[display]
# Brightness level (0-100)
brightness = 80

# Theme preference
# Options: "dark", "light", "auto"
theme = "dark"

# Calculator settings
[calculator]
# Angle mode for trigonometric functions
# Options: "degrees", "radians"
angle_mode = "degrees"

# Number format
# Options: "auto", "fixed", "scientific"
number_format = "auto"

# Decimal places when using fixed format (0-15)
decimal_places = 6
